<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interval Dodger</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <p class="eyebrow">Phaser + Vite</p>
        <h1>Interval Dodger</h1>
        <p class="subtitle">Procedural top-down dodger with heat and recovery cycles.</p>
      </header>
      <main class="game-shell">
        <div id="phaser-example" class="game-frame">
          <div id="mobile-controls-overlay" class="mobile-controls-overlay" aria-hidden="true">
            <div id="mobile-joystick" class="mobile-joystick" aria-label="Movement joystick">
              <button
                type="button"
                id="mobile-joystick-drag"
                class="mobile-joystick-drag"
                aria-label="Drag joystick position"
              >
                ⠿
              </button>
              <div id="mobile-joystick-base" class="mobile-joystick-base">
                <div id="mobile-joystick-thumb" class="mobile-joystick-thumb"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
